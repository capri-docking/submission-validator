[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "submission-validator"
version = "0.1.0"
description = "Validate CAPRI submissions"
authors = [{ name = "placeholder", email = "email@email.com" }]
readme = "README.md"
requires-python = ">=3.8"

[tool.hatch.build.targets.wheel]
packages = ["src/submission_validator"]

[project.scripts]
submission-validator = "submission_validator.cli:main"

[tool.pytest.ini_options]
python_files = "test_*.py"
